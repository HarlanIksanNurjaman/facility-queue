<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacilityQueue Pro | Sistem Manajemen Fasilitas Kampus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f172a, #1e293b, #334155); min-height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 25px; }
        .stat-card { background: white; color: #111; border-radius: 20px; padding: 20px; text-align: center; height: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-num { font-size: 30px; font-weight: bold; color: #0d6efd; }
        .list-group-item { border-radius: 14px !important; margin-bottom: 8px; transition: 0.3s; border: none; background: rgba(255,255,255,0.9); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold"><i class="bi bi-building"></i> FacilityQueue Pro</span>
    </div>
</nav>

<div class="container py-2">
    <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="stat-card"><i class="bi bi-people-fill fs-2"></i><div id="totalQueue" class="stat-num">0</div>Total Antrean</div></div>
        <div class="col-md-4"><div class="stat-card"><i class="bi bi-exclamation-triangle-fill fs-2 text-danger"></i><div id="urgentCount" class="stat-num">0</div>Prioritas</div></div>
        <div class="col-md-4"><div class="stat-card"><i class="bi bi-check-circle-fill fs-2 text-success"></i><div id="processedCount" class="stat-num">0</div>Diproses</div></div>
    </div>

    <div class="glass">
        <h2 class="mb-3">Sistem Manajemen Fasilitas Kampus</h2>
        <p>Struktur Data: <b>Deque (Double-Ended Queue)</b></p>

        <div class="row g-3">
            <div class="col-md-4"><input type="text" id="peminjam" class="form-control" placeholder="Nama Peminjam"></div>
            <div class="col-md-4">
                <select id="kategori" class="form-select">
                    <option>Ruang Kelas</option>
                    <option>Laboratorium</option>
                    <option>Aula</option>
                    <option>Studio Multimedia</option>
                </select>
            </div>
            <div class="col-md-4 d-grid"><button onclick="addRear()" class="btn btn-primary">Tambah Antrean</button></div>
            <div class="col-md-6 d-grid"><button onclick="addFront()" class="btn btn-danger">Tambah Prioritas</button></div>
            <div class="col-md-6 d-grid"><button onclick="removeFront()" class="btn btn-success">Proses Antrean</button></div>
            <div class="col-md-8"><input type="text" id="searchInput" class="form-control" placeholder="Cari peminjam..." onkeyup="render()"></div>
            <div class="col-md-4 d-grid"><button onclick="exportData()" class="btn btn-warning">Export JSON</button></div>
        </div>

        <hr class="my-4">
        <h4>Daftar Antrean</h4>
        <div id="queueList" class="list-group"></div>
        
        <h4 class="mt-4">Riwayat Selesai</h4>
        <div id="historyList" class="list-group"></div>
    </div>
</div>

<script>
    /*
     * ALGORITMA: Deque (Double-Ended Queue)
     * Penjelasan Teknis:
     * - AddRear: O(1) - Menambah di akhir menggunakan push()
     * - AddFront: O(n) - Menambah di depan menggunakan unshift() (geser indeks)
     * - RemoveFront: O(n) - Menghapus dari depan menggunakan shift() (geser indeks)
     */

    let deque = JSON.parse(localStorage.getItem("fasilitasData")) || [];
    let history = JSON.parse(localStorage.getItem("historyData")) || [];
    let processed = parseInt(localStorage.getItem("processed")) || 0;

    function save() {
        localStorage.setItem("fasilitasData", JSON.stringify(deque));
        localStorage.setItem("historyData", JSON.stringify(history));
        localStorage.setItem("processed", processed);
        render();
    }

    function addRear() {
        let n = document.getElementById("peminjam").value;
        let k = document.getElementById("kategori").value;
        if(!n) return alert("Nama peminjam wajib diisi!");
        deque.push({nama: n, kat: k, isUrgent: false});
        save();
    }

    function addFront() {
        let n = document.getElementById("peminjam").value;
        let k = document.getElementById("kategori").value;
        if(!n) return alert("Nama peminjam wajib diisi!");
        deque.unshift({nama: n, kat: k, isUrgent: true});
        save();
    }

    function removeFront() {
        if(deque.length === 0) return alert("Antrean kosong!");
        let x = deque.shift();
        history.unshift(x);
        processed++;
        save();
    }

    function exportData() {
        const dataStr = JSON.stringify({queue: deque, history: history}, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "facilityqueue.json";
        a.click();
    }

    function render() {
        let keyword = document.getElementById("searchInput")?.value.toLowerCase() || "";
        let filtered = deque.filter(x => x.nama.toLowerCase().includes(keyword));

        document.getElementById("queueList").innerHTML = filtered.map((x, i) => `
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <div><b>${i+1}.</b> ${x.nama} <small class="text-muted">(${x.kat})</small></div>
                <span class="badge ${x.isUrgent?'bg-danger':'bg-primary'}">${x.isUrgent?'DARURAT':'NORMAL'}</span>
            </div>`).join("");

        document.getElementById("historyList").innerHTML = history.slice(0, 5).map(x => `
            <div class="list-group-item text-muted small">✅ ${x.nama} - ${x.kat}</div>
        `).join("");

        document.getElementById("totalQueue").innerText = deque.length;
        document.getElementById("urgentCount").innerText = deque.filter(x => x.isUrgent).length;
        document.getElementById("processedCount").innerText = processed;
    }

    render();
</script>

</body>
</html>
